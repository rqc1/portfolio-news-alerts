# render.yaml – Render Blueprint para InvestAIlert (backend)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: investailert-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLOUD_MODE
        value: "true"
      - key: LLM_PROVIDER
        value: "github"
      - key: GITHUB_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: "portfolio_alerts"
      - key: NOTIFICATIONS_ENABLED
        value: "true"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NOTIFICATION_EMAIL_TO
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
